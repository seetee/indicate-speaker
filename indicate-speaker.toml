# indicate-speaker.toml — config for the let's-play crew.
#
# The common case: cd into the episode's sources/ folder and run
#   python3 /path/to/indicate-speaker.py
# — all four render in parallel, quiet mics are handled automatically. Run
# anywhere else and the script asks for the sources directory (or point it
# there with --indir / a folder as the first argument).
#
#   python3 indicate-speaker.py --contact-sheet            # preview the look
#   python3 indicate-speaker.py --discover                 # re-identify tracks
#
# Source files are found by suffix: a person with suffix "k" matches
# YYYY-MM-DD_k.mkv, either directly in the input folder or in a complete
# episode folder up to two levels below it (newest episode wins; pin one
# with --date 2026-06-13).

[project]
width  = 1920
height = 1080
fps    = 60
stream_title = "Track2"   # the audio stream title read from each MKV

[input]
# dir  = "/path/to/episode"    # default: the directory the script is run from
# date = "2026-06-13"          # pin one episode; omit to use the newest

[output]
jobs = 4   # render all four in parallel; use  -j 1  on the slow archive disk
# codec = "qtrle"   # or "ffv1" (.mkv, half the size) / "utvideo" (.mkv, fast)

# --- Optional fine-tuning. Delete any line to use the default shown. ---
[layout]
head_size     = 56     # head size in px at 100% (while speaking)
gap           = 8      # vertical gap between heads
margin_top    = 12
margin_left   = 12
silent_scale  = 0.88   # head shrinks to this fraction when fully quiet
silent_dim    = 0.78   # head dims to this brightness/opacity when fully quiet
glow_strength = 0.55   # peak opacity of the coloured glow (scales all bloom layers)
ring_width    = 3
breath_freq   = 0.40   # Hz; idle breathing pulse rate (lower = slower, dreamier)
breath_scale  = 0.06   # ±fraction brightness swing while silent (0 = off)

[gate]
open_db              = -38.0  # envelope starts rising above this loudness
full_db              = -16.0  # envelope hits 100% at/above this
close_db             = -46.0  # below this, forced to silent (room tone, breaths)
spring_stiffness     = 400.0  # k; higher = snappier snap-to-speaking
spring_damping_ratio = 0.65   # ζ; 1.0 = no overshoot, 0.4 = noticeably bouncy
# normalize = "auto"   # "auto" (default): tracks that the thresholds above
                       # clearly fail (far-too-quiet mics) automatically get
                       # per-person thresholds derived from their own levels;
                       # true = always derive, false = never.
                       # --normalize on the command line forces true.
# norm_low_pct  = 15.0 # percentile of active frames used as open_db
# norm_high_pct = 90.0 # percentile of active frames used as full_db

# Any [gate] value can also be set inside a [[person]] section to override it
# for that person only, e.g. open_db = -60.0 for one unusually quiet mic.

# --- The crew, top to bottom on screen. ---
# `suffix` is the letter in the filename. `nick` fetches the head from
# mc-heads.net; to use local PNGs instead add e.g. head_file = "heads/seetee.png".
# `stream_title` overrides the project-level default for this person only;
# run --discover to identify and save the right title automatically.

[[person]]
name   = "Kenneth"
stream_title = "Voice audio"
suffix = "k"
nick   = "seetee"
colour = "#ff4da6"   # hot pink

[[person]]
name   = "Henrik"
stream_title = "Track2"
suffix = "h"
nick   = "endemism"
colour = "#e23636"   # red

[[person]]
name   = "Robin"
stream_title = "Track2"
suffix = "r"
nick   = "v_eteris"
colour = "#2f86e0"   # blue

[[person]]
name   = "Joel"
stream_title = "Track2"
suffix = "j"
nick   = "delvispresley"
colour = "#36b14a"   # green
